name: Deploy to Shared Hosting

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "config/**"
      - "public/**"
      - "bootstrap.php"
      - ".cpanel.yml"
      - ".env.example"
      - ".github/workflows/shared-hosting-deploy.yml"
  workflow_dispatch:

concurrency:
  group: shared-hosting-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          [ -n "$FTP_SERVER" ] || { echo "::error::Missing GitHub secret: FTP_SERVER"; exit 1; }
          [ -n "$FTP_USERNAME" ] || { echo "::error::Missing GitHub secret: FTP_USERNAME"; exit 1; }
          [ -n "$FTP_PASSWORD" ] || { echo "::error::Missing GitHub secret: FTP_PASSWORD"; exit 1; }
          [ -n "$FTP_SERVER_DIR" ] || { echo "::error::Missing GitHub secret: FTP_SERVER_DIR"; exit 1; }

      - name: Deploy via FTP/FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/.env
            **/.env.*
            **/node_modules/**
            **/vendor/**
            **/storage/logs/**
            **/tmp/**
            **/.DS_Store
            **/Thumbs.db
